apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app1
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: {{ .Values.app1.ingress.hosts[0].host }}
      http:
        paths:
          - path: /
            pathType: {{ .Values.app1.ingress.hosts[0].paths[0].pathType }}
            backend:
              service:
                name: app1
                port:
                  number: 80
  tls:
    - hosts:
        - {{ .Values.app1.ingress.hosts[0].host }}
