version: '3.8'

services:
  setup_dns:
    build:
      context: .
      dockerfile: Dockerfile.setup_dns
    network_mode: host
    command: bash /setup_local_dns.sh
    restart: "no"

  generate_certs:
    build:
      context: .
      dockerfile: Dockerfile.generate_certs
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: '512M'
        reservations:
          cpus: '0.1'
          memory: '256M'

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Elasticsearch__Uri=http://elasticsearch:9200
      - Stripe__ApiKey=${STRIPE_API_KEY}
      - SocialMedia__Facebook__AppId=${FACEBOOK_APP_ID}
      - SocialMedia__Facebook__AppSecret=${FACEBOOK_APP_SECRET}
      - SocialMedia__Twitter__ApiKey=${TWITTER_API_KEY}
      - SocialMedia__Twitter__ApiSecret=${TWITTER_API_SECRET}
      - SomeOtherService__ApiKey=${SOME_OTHER_SERVICE_API_KEY}
      - RabbitMq__Host=rabbitmq
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - setup_dns
      - generate_certs
      - db_migrations

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Elasticsearch__Uri=http://elasticsearch:9200
      - Stripe__ApiKey=${STRIPE_API_KEY}
      - SocialMedia__Facebook__AppId=${FACEBOOK_APP_ID}
      - SocialMedia__Facebook__AppSecret=${FACEBOOK_APP_SECRET}
      - SocialMedia__Twitter__ApiKey=${TWITTER_API_KEY}
      - SocialMedia__Twitter__ApiSecret=${TWITTER_API_SECRET}
      - SomeOtherService__ApiKey=${SOME_OTHER_SERVICE_API_KEY}
      - RabbitMq__Host=rabbitmq
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - setup_dns
      - generate_certs
      - db_migrations

  app3:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Elasticsearch__Uri=http://elasticsearch:9200
      - Stripe__ApiKey=${STRIPE_API_KEY}
      - SocialMedia__Facebook__AppId=${FACEBOOK_APP_ID}
      - SocialMedia__Facebook__AppSecret=${FACEBOOK_APP_SECRET}
      - SocialMedia__Twitter__ApiKey=${TWITTER_API_KEY}
      - SocialMedia__Twitter__ApiSecret=${TWITTER_API_SECRET}
      - SomeOtherService__ApiKey=${SOME_OTHER_SERVICE_API_KEY}
      - RabbitMq__Host=rabbitmq
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - setup_dns
      - generate_certs
      - db_migrations

  db_migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    command: ["database", "update"]
    networks:
      - internal

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app1
      - app2
      - app3
      - generate_certs
    networks:
      - external
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: '512M'
        reservations:
          cpus: '0.1'
          memory: '256M'

  verify_dns_and_access:
    image: busybox
    volumes:
      - ./verify_dns_and_access.sh:/verify_dns_and_access.sh
    depends_on:
      - nginx
    command: sh /verify_dns_and_access.sh
    network_mode: host

networks:
  external:
    driver: bridge
  internal:
    driver: bridge
