version: '3.8'

services:
  postgres_primary:
    image: bitnami/postgresql-repmgr:latest
    user: "1001"
    environment:
      - POSTGRES_PASSWORD=mypassword  # Updated to match the default password in init_pg.sh
      - POSTGRES_USER=myuser          # Updated to match the default user in init_pg.sh
      - POSTGRES_DB=your_postgres_db
      - REPMGR_PRIMARY_ROLE=true
      - REPMGR_NODE_ID=1
      - REPMGR_NODE_NAME=postgres-primary-1
      - REPMGR_NODE_NETWORK_NAME=postgres_primary
      - REPMGR_PARTNER_NODES=postgres-primary-1,postgres-standby-2
      - REPMGR_PRIMARY_HOST=postgres_primary
      - REPMGR_PASSWORD=mypassword   # Ensure consistency if this password is used for replication
      - VAULT_ADDR=http://vault:8200
    ports:
      - "5434:5432"
    volumes:
      - ../../data/postgres-primary-data:/bitnami/postgresql
      - ../../scripts:/scripts  # Ensure the path mounts the scripts directory correctly
      - ../../ssl/certs:/etc/ssl/certs
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d postgres"]  # Match with the user used in init_pg.sh
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["/scripts/init_pg.sh"]
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s


  postgres_standby:
    image: bitnami/postgresql-repmgr:latest
    user: "1001"
    environment:
      - POSTGRES_PASSWORD=mypassword  # Update to match the default password in init_pg.sh
      - POSTGRES_USER=myuser          # Update to match the default user in init_pg.sh
      - POSTGRES_DB=your_postgres_db
      - REPMGR_PRIMARY_ROLE=false
      - REPMGR_NODE_ID=2
      - REPMGR_NODE_NAME=postgres-standby-2
      - REPMGR_NODE_NETWORK_NAME=postgres_standby
      - REPMGR_PARTNER_NODES=postgres-primary-1,postgres-standby-2
      - REPMGR_PRIMARY_HOST=postgres_primary
      - REPMGR_PASSWORD=mypassword   # Ensure consistency if this is related to user permissions
    ports:
      - "5435:5432"
    volumes:
      - ../../data/postgres-standby-data:/bitnami/postgresql
      - ../../scripts:/scripts
      - ../../ssl/certs:/etc/ssl/certs
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d postgres"]  # Match with the user used in init_pg.sh
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["/scripts/init_pg.sh"]
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s


  haproxy:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.haproxy
    volumes:
      - ../../haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
      - ../../ssl/certs:/etc/ssl/certs
    ports:
      - "5433:5432"
      - "8404:8404"
    depends_on:
      - postgres_primary
      - postgres_standby
    networks:
      - internal_network
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  redis-master:
    image: redis:latest
    command: ["redis-server", "/etc/redis/redis.conf", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
      - ../../config/redis.conf:/etc/redis/redis.conf
      - ../../ssl/certs:/etc/ssl/certs
    networks:
      - internal_network
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cert", "/etc/ssl/certs/redis.crt", "--key", "/etc/ssl/certs/redis.key", "--cacert", "/etc/ssl/certs/ca.crt", "-h", "127.0.0.1", "-p", "6379", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  redis-replica:
    image: redis:latest
    command: ["redis-server", "/etc/redis/redis.conf", "--replicaof", "redis-master", "6379"]
    ports:
      - "6380:6379"
    volumes:
      - redis-replica-data:/data
      - ../../config/redis.conf:/etc/redis/redis.conf
      - ../../ssl/certs:/etc/ssl/certs
    networks:
      - internal_network
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cert", "/etc/ssl/certs/redis.crt", "--key", "/etc/ssl/certs/redis.key", "--cacert", "/etc/ssl/certs/ca.crt", "-h", "127.0.0.1", "-p", "6379", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  es-node-1:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.4.3
    environment:
      - cluster.name=my-cluster
      - node.name=es-node-1
      - discovery.seed_hosts=es-node-1,es-node-2
      - cluster.initial_master_nodes=es-node-1,es-node-2
      - ELASTIC_PASSWORD=your_elastic_password
      - NODE_NAME=es-node-1
      - ES_JAVA_OPTS=-Djava.security.policy=/usr/share/elasticsearch/config/my-security.policy
    volumes:
      - es-data-node1:/usr/share/elasticsearch/data
      - es-backup:/usr/share/elasticsearch/backup
      - ../../config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
      - ../../ssl/certs/ca.crt:/usr/share/elasticsearch/config/ca.crt
      - ../../ssl/certs/es-node-1.crt:/usr/share/elasticsearch/config/es-node-1.crt
      - ../../ssl/certs/es-node-1.key:/usr/share/elasticsearch/config/es-node-1.key
      - ../../config/log4j2.properties:/usr/share/elasticsearch/config/log4j2.properties
      - ../../config/jvm.options:/usr/share/elasticsearch/config/jvm.options
      - ../../elasticsearch/logs:/usr/share/elasticsearch/logs
      - ../../elasticsearch/heapdumps:/var/lib/elasticsearch/heapdumps
      - ../../config/my-security.policy:/usr/share/elasticsearch/config/my-security.policy
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f https://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  es-node-2:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.4.3
    environment:
      - cluster.name=my-cluster
      - node.name=es-node-2
      - discovery.seed_hosts=es-node-1,es-node-2
      - cluster.initial_master_nodes=es-node-1,es-node-2
      - ELASTIC_PASSWORD=your_elastic_password
      - NODE_NAME=es-node-2
      - ES_JAVA_OPTS=-Djava.security.policy=/usr/share/elasticsearch/config/my-security.policy
    volumes:
      - es-data-node2:/usr/share/elasticsearch/data
      - es-backup:/usr/share/elasticsearch/backup
      - ../../config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
      - ../../ssl/certs/ca.crt:/usr/share/elasticsearch/config/ca.crt
      - ../../ssl/certs/es-node-2.crt:/usr/share/elasticsearch/config/es-node-2.crt
      - ../../ssl/certs/es-node-2.key:/usr/share/elasticsearch/config/es-node-2.key
      - ../../config/log4j2.properties:/usr/share/elasticsearch/config/log4j2.properties
      - ../../config/jvm.options:/usr/share/elasticsearch/config/jvm.options
      - ../../elasticsearch/logs:/usr/share/elasticsearch/logs
      - ../../elasticsearch/heapdumps:/var/lib/elasticsearch/heapdumps
      - ../../config/my-security.policy:/usr/share/elasticsearch/config/my-security.policy
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f https://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  rabbitmq-node1:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=your_rabbitmq_user
      - RABBITMQ_DEFAULT_PASS=your_rabbitmq_password
      - RABBITMQ_NODENAME=rabbit@rabbitmq-node1
    hostname: rabbitmq-node1
    networks:
      internal_network:
        aliases:
          - rabbitmq-node1
    volumes:
      - rabbitmq-data-node1:/var/lib/rabbitmq
      - ../../ssl/certs:/etc/ssl/certs
      - ../../scripts:/etc/rabbitmq-init
    healthcheck:
      test: ["CMD-SHELL", "rabbitmqctl --erlang-cookie $(cat /var/lib/rabbitmq/.erlang.cookie) status"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: >
      /bin/bash -c "
      rabbitmq-server;
      while ! rabbitmqctl wait /var/lib/rabbitmq/mnesia/rabbit@rabbitmq-node1.pid --timeout 60; do
        echo 'Waiting for RabbitMQ server to start...'
        sleep 1
      done;
      echo 'RabbitMQ server started.';
      rabbitmqctl set_policy ha-all '.*' '{\"ha-mode\":\"all\"}' --apply-to queues;
      "
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  rabbitmq-node2:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=your_rabbitmq_user
      - RABBITMQ_DEFAULT_PASS=your_rabbitmq_password
      - RABBITMQ_NODENAME=rabbit@rabbitmq-node2
    hostname: rabbitmq-node2
    networks:
      internal_network:
        aliases:
          - rabbitmq-node2
    volumes:
      - rabbitmq-data-node2:/var/lib/rabbitmq
      - ../../ssl/certs:/etc/ssl/certs
      - ../../scripts:/etc/rabbitmq-init
    depends_on:
      - rabbitmq-node1
    healthcheck:
      test: ["CMD-SHELL", "rabbitmqctl --erlang-cookie $(cat /var/lib/rabbitmq/.erlang.cookie) status"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: >
      /bin/bash -c "
      rabbitmq-server;
      while ! rabbitmqctl wait /var/lib/rabbitmq/mnesia/rabbit@rabbitmq-node2.pid --timeout 60; do
        echo 'Waiting for RabbitMQ server to start...'
        sleep 1
      done;
      echo 'RabbitMQ server started.';
      while ! rabbitmqctl -n rabbit@rabbitmq-node1 --erlang-cookie $(cat /var/lib/rabbitmq/.erlang.cookie) ping; do
        echo 'Waiting for rabbitmq-node1...'
        sleep 5
      done;
      echo 'rabbitmq-node1 is ready. Joining the cluster...';
      rabbitmqctl stop_app;
      rabbitmqctl reset;
      rabbitmqctl join_cluster rabbit@rabbitmq-node1;
      rabbitmqctl start_app;
      rabbitmqctl await_online_nodes 2 --timeout 60;
      "
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  minio1:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=your_minio_user
      - MINIO_ROOT_PASSWORD=your_minio_password
      - MINIO_SERVER_CERT=/etc/ssl/certs/public.crt
      - MINIO_SERVER_KEY=/etc/ssl/certs/private.key
    volumes:
      - minio-data1:/data
      - ../../ssl/certs:/etc/ssl/certs
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f https://localhost:9000/minio/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: server https://minio{1...4}/data --certs-dir /etc/ssl/certs
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  minio2:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=your_minio_user
      - MINIO_ROOT_PASSWORD=your_minio_password
      - MINIO_SERVER_CERT=/etc/ssl/certs/public.crt
      - MINIO_SERVER_KEY=/etc/ssl/certs/private.key
    volumes:
      - minio-data2:/data
      - ../../ssl/certs:/etc/ssl/certs
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f https://localhost:9000/minio/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: server https://minio{1...4}/data --certs-dir /etc/ssl/certs
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../../config/prometheus.yml:/etc/prometheus/prometheus.yml  # Ensure you have a Prometheus config file
    networks:
      - internal_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  # Add Grafana service
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin  # Change this for security
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s



networks:
  internal_network:
    name: internal_network
    ipam:
      config:
        - subnet: 172.22.0.0/16
  external_network:
    name: external_network
    ipam:
      config:
        - subnet: 172.23.0.0/16

volumes:
  redis-master-data:
    driver: local
  redis-replica-data:
    driver: local
  es-data-node1:
    driver: local
  es-data-node2:
    driver: local
  es-backup:
    driver: local
  rabbitmq-data-node1:
    driver: local
  rabbitmq-data-node2:
    driver: local
  minio-data1:
    driver: local
  minio-data2:
    driver: local
  grafana-data:  # Added the missing Grafana volume definition
    driver: local