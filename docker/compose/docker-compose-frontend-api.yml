version: '3.8'

services:
  setup_dns:
    build:
      context: ../../  # Correct context pointing to the correct docker folder
      dockerfile: docker/Dockerfile.setup_dns
    network_mode: host
    command: bash /setup_local_dns.sh
    restart: "no"

  app1:
    build:
      context: ../../  # Correct context pointing to the correct docker folder
      dockerfile: docker/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Elasticsearch__Uri=http://elasticsearch:9200
      - Stripe__ApiKey=${STRIPE_API_KEY}
      - SocialMedia__Facebook__AppId=${FACEBOOK_APP_ID}
      - SocialMedia__Facebook__AppSecret=${FACEBOOK_APP_SECRET}
      - SocialMedia__Twitter__ApiKey=${TWITTER_API_KEY}
      - SocialMedia__Twitter__ApiSecret=${TWITTER_API_SECRET}
      - SomeOtherService__ApiKey=${SOME_OTHER_SERVICE_API_KEY}
      - RabbitMq__Host=rabbitmq
    volumes:
      - uploads:/app/uploads
    networks:
      - internal_network
      - external_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - setup_dns
      - db_migrations

  app2:
    build:
      context: ../../  # Correct context pointing to the correct docker folder
      dockerfile: docker/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Elasticsearch__Uri=http://elasticsearch:9200
      - Stripe__ApiKey=${STRIPE_API_KEY}
      - SocialMedia__Facebook__AppId=${FACEBOOK_APP_ID}
      - SocialMedia__Facebook__AppSecret=${FACEBOOK_APP_SECRET}
      - SocialMedia__Twitter__ApiKey=${TWITTER_API_KEY}
      - SocialMedia__Twitter__ApiSecret=${TWITTER_API_SECRET}
      - SomeOtherService__ApiKey=${SOME_OTHER_SERVICE_API_KEY}
      - RabbitMq__Host=rabbitmq
    volumes:
      - uploads:/app/uploads
    networks:
      - internal_network
      - external_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - setup_dns
      - db_migrations

  app3:
    build:
      context: ../../  # Correct context pointing to the correct docker folder
      dockerfile: docker/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Elasticsearch__Uri=http://elasticsearch:9200
      - Stripe__ApiKey=${STRIPE_API_KEY}
      - SocialMedia__Facebook__AppId=${FACEBOOK_APP_ID}
      - SocialMedia__Facebook__AppSecret=${FACEBOOK_APP_SECRET}
      - SocialMedia__Twitter__ApiKey=${TWITTER_API_KEY}
      - SocialMedia__Twitter__ApiSecret=${TWITTER_API_SECRET}
      - SomeOtherService__ApiKey=${SOME_OTHER_SERVICE_API_KEY}
      - RabbitMq__Host=rabbitmq
    volumes:
      - uploads:/app/uploads
    networks:
      - internal_network
      - external_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - setup_dns
      - db_migrations

  db_migrations:
    build:
      context: ../../  # Correct context pointing to the correct docker folder
      dockerfile: docker/Dockerfile.migrations
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    command: ["database", "update"]
    networks:
      - internal_network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../../nginx/ssl:/etc/nginx/ssl
      - ./logs:/var/log/nginx
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - external_network
      - internal_network

  verify_dns_and_access:
    image: busybox
    volumes:
      - ./verify_dns_and_access.sh:/verify_dns_and_access.sh
    depends_on:
      - nginx
    command: sh /verify_dns_and_access.sh
    network_mode: host

networks:
  internal_network:
    external: true
    name: internal_network
    ipam:
      config:
        - subnet: 172.18.0.0/16
  external_network:
    external: true
    name: external_network
    ipam:
      config:
        - subnet: 172.19.0.0/16

volumes:
  uploads:
