version: '3.8'  # Ensure you're using a version that supports Docker Swarm features

services:
  init-certs:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.generate_certs_backend
    volumes:
      - ../../ssl:/ssl
    environment:
      - CERT_DIR=/ssl/certs
      - LOG_FILE=/ssl/cert_generation.log
      - ENVIRONMENT=${ENVIRONMENT}
      - EMAIL=${EMAIL}
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "test -f /ssl/certs/postgres.crt && test -f /ssl/certs/redis.crt && test -f /ssl/certs/rabbitmq.crt && test -f /ssl/certs/elasticsearch.crt"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: none

  etcd:
    image: quay.io/coreos/etcd:v3.4.15
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    ports:
      - "2379:2379"
    networks:
      - internal_network
    deploy:
      replicas: 1

  patroni:
    image: d2cio/patroni
    environment:
      - PATRONI_SCOPE=postgres_cluster
      - PATRONI_NAMESPACE=/service/
      - PATRONI_NAME=postgresql0
      - PATRONI_ETCD_HOSTS=etcd:2379
      - PATRONI_SUPERUSER_USERNAME=postgres
      - PATRONI_SUPERUSER_PASSWORD=${POSTGRES_PASSWORD}
      - PATRONI_REPLICATION_USERNAME=replicator
      - PATRONI_REPLICATION_PASSWORD=replpassword
    volumes:
      - patroni_data:/var/lib/postgresql/data
      - ../../ssl/certs:/etc/ssl/certs
    networks:
      - internal_network
    depends_on:
      - etcd
    deploy:
      replicas: 3

  pgbackrest:
    image: postgres:13
    environment:
      - PGBACKREST_STANZA=pgcluster
      - PGBACKREST_REPO1_PATH=/var/lib/pgbackrest
      - PGBACKREST_PG1_PATH=/var/lib/postgresql/data
    volumes:
      - pgbackrest_data:/var/lib/pgbackrest
      - patroni_data:/var/lib/postgresql/data
    networks:
      - internal_network
    command: ["pgbackrest", "--stanza=pgcluster", "backup"]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@patroni:5432/postgres?sslmode=disable
    networks:
      - internal_network
    depends_on:
      - patroni
    ports:
      - "9187:9187"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  redis:
    image: redis:7
    command: ["redis-server", "--tls-cert-file /etc/ssl/certs/redis.crt", "--tls-key-file /etc/ssl/certs/redis.key", "--tls-ca-cert-file /etc/ssl/certs/ca.crt", "--port 0", "--tls-port 6379"]
    volumes:
      - redis_data:/data
      - ../../ssl/certs:/etc/ssl/certs
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "-p", "6379", "--tls", "--cacert", "/etc/ssl/certs/ca.crt", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - internal_network
    depends_on:
      - init-certs
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: '1G'
        reservations:
          cpus: '0.25'
          memory: '512M'

  redis_exporter:
    image: oliver006/redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    networks:
      - internal_network
    depends_on:
      - redis
    ports:
      - "9121:9121"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.4.3
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=false  # Disabling X-Pack security
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - es_backup:/usr/share/elasticsearch/backup
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:${ELASTIC_PASSWORD} -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - internal_network
    depends_on:
      - init-certs
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2.0'
          memory: '8G'
        reservations:
          cpus: '1.0'
          memory: '4G'

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../../config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - internal_network
    depends_on:
      - init-certs
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: '2G'
        reservations:
          cpus: '0.25'
          memory: '1G'
    restart: always
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - internal_network
    depends_on:
      - init-certs
      - prometheus
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: '1G'
        reservations:
          cpus: '0.25'
          memory: '512M'
    restart: always
    ports:
      - "3000:3000"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf  
      - ../../ssl/certs:/etc/ssl/certs
    healthcheck:
      test: ["CMD-SHELL", "rabbitmqctl status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - internal_network
    depends_on:
      - init-certs
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: '1G'
        reservations:
          cpus: '0.25'
          memory: '512M'

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # MinIO API port
      - "9001:9001"  # MinIO Console port
    command: server /data
    networks:
      - internal_network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: '2G'
        reservations:
          cpus: '0.5'
          memory: '1G'

  setup_dns:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.setup_dns
    network_mode: host
    command: bash /setup_local_dns.sh
    restart: "no"

  generate_certs:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.generate_certs
    volumes:
      - ../../nginx/ssl:/etc/nginx/ssl
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
    networks:
      - internal_network

  app1:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.app1
    ports:
      - "8081:8081"
    depends_on:
      - postgres_exporter
    networks:
      - internal_network
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  app2:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.app2
    ports:
      - "8082:8082"
    depends_on:
      - postgres_exporter
    networks:
      - internal_network
    deploy:
      replicas: 1
      restart_policy:
        condition: any

networks:
  internal_network:
    driver: overlay

volumes:
  postgres_data:
  redis_data:
  es_data:
  es_backup:
  prometheus_data:
  grafana_data:
  minio_data:
  pgbackrest_data:
  patroni_data:
  rabbitmq_data:
